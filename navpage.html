<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E家导航 - E家分享专属导航页</title>
<meta name="application-name" content="E家导航">
<meta name="theme-color" content="#0a0a0f">
<link rel="icon" type="image/x-icon" href="https://www.5iehome.cc/favicon.ico">
<link rel="dns-prefetch" href="https://fonts.loli.net">
<link rel="dns-prefetch" href="https://gstatic.loli.net">
<link rel="dns-prefetch" href="https://www.google.com">
<link rel="dns-prefetch" href="https://icons.duckduckgo.com">
<link rel="dns-prefetch" href="https://trae-api-cn.mchost.guru">
<link rel="dns-prefetch" href="https://t0.gstatic.com">
<link rel="preconnect" href="https://fonts.loli.net">
<link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
<link rel="preconnect" href="https://t0.gstatic.com" crossorigin>
<link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=LXGW+WenKai:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" crossorigin="anonymous">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
.hidden{display:none!important}
:root{
  --radius-sm:8px;--radius-md:14px;--radius-lg:20px;--radius-xl:28px;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono:'SF Mono','JetBrains Mono',monospace;
  --font-cn:'LXGW WenKai',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
  --transition-slow:0.4s cubic-bezier(0.4,0,0.2,1);
  --accent:#6c5ce7;--accent-light:#a29bfe;--accent-glow:rgba(108,92,231,0.3);
  --danger:#e74c3c;--success:#00b894;--sidebar-w:200px;
}
[data-theme="dark"]{
  --bg-primary:#0a0a0f;--bg-secondary:#12121a;
  --bg-card:rgba(255,255,255,0.04);--bg-card-hover:rgba(255,255,255,0.07);
  --bg-glass:rgba(255,255,255,0.06);--border-glass:rgba(255,255,255,0.08);
  --border-glass-hover:rgba(255,255,255,0.15);
  --text-primary:rgba(255,255,255,0.92);--text-secondary:rgba(255,255,255,0.55);--text-muted:rgba(255,255,255,0.3);
  --shadow-card:0 4px 24px rgba(0,0,0,0.3);--shadow-float:0 12px 48px rgba(0,0,0,0.5);
  --mesh-c1:rgba(108,92,231,0.12);--mesh-c2:rgba(0,184,148,0.08);--mesh-c3:rgba(162,155,254,0.05);
  --noise-opacity:0.03;--cell-bg:rgba(255,255,255,0.02);--cell-hover:rgba(255,255,255,0.06);
  --input-bg:rgba(255,255,255,0.04);--btn-overlay:rgba(0,0,0,0.5);
  --favicon-bg:rgba(255,255,255,0.06);--dash-border:rgba(255,255,255,0.08);--dash-hover:rgba(255,255,255,0.15);
  --emoji-hover:rgba(255,255,255,0.1);--action-hover:rgba(255,255,255,0.06);
  --engine-hover:rgba(255,255,255,0.06);--search-focus-bg:rgba(255,255,255,0.08);
  --sidebar-bg:rgba(18,18,26,0.85);--sidebar-border:rgba(255,255,255,0.06);
  --nav-item-hover:rgba(255,255,255,0.06);--nav-item-active:rgba(108,92,231,0.15);
  --group-icon-0-bg:rgba(108,92,231,0.2);--group-icon-0-c:#a29bfe;
  --group-icon-1-bg:rgba(0,184,148,0.2);--group-icon-1-c:#55efc4;
  --group-icon-2-bg:rgba(253,203,110,0.2);--group-icon-2-c:#fdcb6e;
  --group-icon-3-bg:rgba(232,67,147,0.2);--group-icon-3-c:#fd79a8;
  --group-icon-4-bg:rgba(9,132,227,0.2);--group-icon-4-c:#74b9ff;
  --group-icon-5-bg:rgba(255,118,117,0.2);--group-icon-5-c:#ff7675;
}
[data-theme="light"]{
  --bg-primary:#f5f5f7;--bg-secondary:#ffffff;
  --bg-card:rgba(0,0,0,0.03);--bg-card-hover:rgba(0,0,0,0.05);
  --bg-glass:rgba(255,255,255,0.7);--border-glass:rgba(0,0,0,0.08);
  --border-glass-hover:rgba(0,0,0,0.15);
  --text-primary:rgba(0,0,0,0.88);--text-secondary:rgba(0,0,0,0.5);--text-muted:rgba(0,0,0,0.26);
  --shadow-card:0 4px 24px rgba(0,0,0,0.06);--shadow-float:0 12px 48px rgba(0,0,0,0.1);
  --mesh-c1:rgba(108,92,231,0.06);--mesh-c2:rgba(0,184,148,0.04);--mesh-c3:rgba(162,155,254,0.03);
  --noise-opacity:0.015;--cell-bg:rgba(0,0,0,0.02);--cell-hover:rgba(0,0,0,0.04);
  --input-bg:rgba(0,0,0,0.03);--btn-overlay:rgba(255,255,255,0.8);
  --favicon-bg:rgba(0,0,0,0.04);--dash-border:rgba(0,0,0,0.08);--dash-hover:rgba(0,0,0,0.12);
  --emoji-hover:rgba(0,0,0,0.06);--action-hover:rgba(0,0,0,0.05);
  --engine-hover:rgba(0,0,0,0.04);--search-focus-bg:rgba(255,255,255,0.9);
  --sidebar-bg:rgba(255,255,255,0.85);--sidebar-border:rgba(0,0,0,0.06);
  --nav-item-hover:rgba(0,0,0,0.04);--nav-item-active:rgba(108,92,231,0.1);
  --group-icon-0-bg:rgba(108,92,231,0.12);--group-icon-0-c:#6c5ce7;
  --group-icon-1-bg:rgba(0,184,148,0.12);--group-icon-1-c:#00b894;
  --group-icon-2-bg:rgba(253,203,110,0.15);--group-icon-2-c:#e17055;
  --group-icon-3-bg:rgba(232,67,147,0.12);--group-icon-3-c:#e84393;
  --group-icon-4-bg:rgba(9,132,227,0.12);--group-icon-4-c:#0984e3;
  --group-icon-5-bg:rgba(255,118,117,0.12);--group-icon-5-c:#d63031;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font-body);background:var(--bg-primary);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;transition:background 0.4s ease,color 0.4s ease;
}
.bg-mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 10% 20%,var(--mesh-c1),transparent),
    radial-gradient(ellipse 60% 80% at 85% 70%,var(--mesh-c2),transparent),
    radial-gradient(ellipse 70% 50% at 50% 50%,var(--mesh-c3),transparent);
  transition:background 0.4s ease;
}
.bg-noise{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:var(--noise-opacity);
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;transition:opacity 0.4s ease;
}
.layout{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar-bg);
  border-right:1px solid var(--sidebar-border);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;
  transition:background 0.4s ease;
}
.sidebar-logo{padding:20px 20px 16px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--sidebar-border)}
.sidebar-logo-text{
  font-family:var(--font-cn);font-size:1.5rem;font-weight:700;color:var(--text-primary);
  letter-spacing:0.25em;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-light) 50%,#74b9ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sidebar-clock{padding:16px 16px 14px;border-bottom:1px solid var(--sidebar-border);text-align:center}
.sidebar-clock .clock{font-family:var(--font-mono);font-size:2.4rem;font-weight:300;letter-spacing:0.08em;color:var(--text-primary);margin-bottom:2px;font-variant-numeric:tabular-nums}
.sidebar-clock .clock-date{font-family:var(--font-cn);font-size:0.8rem;color:var(--text-secondary);letter-spacing:0.06em}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border-glass);border-radius:3px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-md);
  cursor:pointer;transition:var(--transition);color:var(--text-secondary);font-size:0.88rem;
  border:none;background:none;width:100%;font-family:var(--font-cn);text-align:left;
  margin-bottom:2px;position:relative;letter-spacing:0.04em;
}
.nav-item:hover{background:var(--nav-item-hover);color:var(--text-primary)}
.nav-item.active{background:var(--nav-item-active);color:var(--accent-light)}
.nav-item-icon{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0}
.nav-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item-count{font-size:0.72rem;color:var(--text-muted);background:var(--cell-bg);padding:2px 7px;border-radius:10px}
.nav-drag-handle{width:16px;height:20px;display:none;flex-shrink:0;align-items:center;justify-content:center;opacity:0.4}
.nav-drag-handle svg{width:12px;height:12px}
.nav-item:hover .nav-drag-handle{display:flex}
.nav-item.dragging{opacity:0.4;background:var(--nav-item-hover)}
.nav-add-group{
  display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;
  border-radius:var(--radius-md);cursor:pointer;transition:var(--transition);color:var(--text-muted);
  border:2px dashed var(--dash-border);background:none;width:100%;font-family:var(--font-cn);
  font-size:0.82rem;margin-top:8px;letter-spacing:0.04em;
}
.nav-add-group:hover{border-color:var(--accent);color:var(--accent-light)}
.sidebar-footer{padding:10px;border-top:1px solid var(--sidebar-border);display:flex;flex-direction:column;gap:3px}
.sidebar-btn{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);color:var(--text-secondary);font-size:0.8rem;
  border:none;background:none;width:100%;font-family:var(--font-cn);text-align:left;letter-spacing:0.04em;
}
.sidebar-btn:hover{background:var(--nav-item-hover);color:var(--text-primary)}
.sidebar-btn svg{width:15px;height:15px;flex-shrink:0}
.sidebar-footer-row{display:flex;gap:3px}
.sidebar-footer-row .sidebar-btn{flex:1;min-width:0;padding:8px 6px;gap:6px;font-size:0.76rem;justify-content:center}
.theme-toggle{position:relative;width:16px;height:16px;flex-shrink:0}
.theme-toggle .sun-icon,.theme-toggle .moon-icon{position:absolute;inset:0;transition:opacity 0.3s ease,transform 0.3s ease}
[data-theme="dark"] .theme-toggle .sun-icon{opacity:1;transform:rotate(0deg)}
[data-theme="dark"] .theme-toggle .moon-icon{opacity:0;transform:rotate(-90deg)}
[data-theme="light"] .theme-toggle .sun-icon{opacity:0;transform:rotate(90deg)}
[data-theme="light"] .theme-toggle .moon-icon{opacity:1;transform:rotate(0deg)}
.main{flex:1;margin-left:var(--sidebar-w);padding:24px 24px 0;display:flex;flex-direction:column;min-height:100vh}
.main .groups-container{flex:1;padding-bottom:80px}
.groups-container{display:flex;flex-direction:column;gap:24px;margin-top:32px}
.group{background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:14px 16px;backdrop-filter:blur(12px);transition:var(--transition);scroll-margin-top:24px}
.group:hover{border-color:var(--border-glass-hover)}
.group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.group-title-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.group-icon{width:24px;height:24px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.group-title{font-family:var(--font-cn);font-size:0.98rem;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.06em}
.group-actions{display:flex;gap:4px;flex-shrink:0}
.group-actions button{background:none;border:none;cursor:pointer;width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:var(--transition);font-size:0.85rem}
.group-actions button:hover{background:var(--action-hover);color:var(--text-secondary)}
.bookmarks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(max(140px,calc((100% - 10px)/7)),1fr));gap:10px;min-width:0}
.bookmark-card{
  display:flex;flex-direction:row;align-items:center;gap:10px;padding:8px 10px;
  background:var(--cell-bg);border:1px solid transparent;border-radius:var(--radius-md);
  cursor:pointer;transition:var(--transition);transition-property:background,border-color,transform,box-shadow;
  text-decoration:none;position:relative;user-select:none;height:48px;
}
.bookmark-card:hover{background:var(--cell-hover);border-color:var(--border-glass);transform:translateY(-2px);box-shadow:var(--shadow-card)}
.bookmark-card:active{transform:translateY(0);transition-duration:0.1s}
.bookmark-card.dragging{opacity:0.4;transform:scale(0.95)}
.bookmark-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.bookmark-favicon{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--favicon-bg);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.bookmark-favicon img{width:22px;height:22px;object-fit:contain}
.bookmark-favicon .fallback-icon{font-size:0.95rem;color:var(--text-muted)}
.bookmark-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;overflow:hidden}
.bookmark-name{font-size:0.8rem;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;letter-spacing:0.02em}
.bookmark-desc{font-size:0.7rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;letter-spacing:0.03em}
.bookmark-edit,.bookmark-delete{
  position:absolute;top:4px;width:22px;height:22px;border-radius:50%;background:var(--btn-overlay);
  border:none;cursor:pointer;display:none;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:0.7rem;transition:var(--transition);backdrop-filter:blur(4px);
}
.bookmark-edit{right:30px}.bookmark-delete{right:4px}
.bookmark-card:hover .bookmark-edit,.bookmark-card:hover .bookmark-delete{display:flex}
.bookmark-edit:hover{background:var(--accent);color:#fff}
.bookmark-delete:hover{background:var(--danger);color:#fff}
.modal-overlay{
  position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease;
}
.modal-overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal{background:var(--bg-secondary);border:1px solid var(--border-glass);border-radius:var(--radius-xl);padding:32px;width:100%;max-width:460px;box-shadow:var(--shadow-float);animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1)}
.modal h2{font-family:var(--font-cn);font-size:1.3rem;font-weight:600;margin-bottom:24px;color:var(--text-primary);letter-spacing:0.06em}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:0.84rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500;font-family:var(--font-cn);letter-spacing:0.04em}
.form-group input{width:100%;padding:12px 14px;background:var(--input-bg);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.95rem;font-family:var(--font-cn);transition:var(--transition);outline:none;letter-spacing:0.03em}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-group input::placeholder{color:var(--text-muted)}
.form-group .input-hint{font-size:0.75rem;color:var(--text-muted);margin-top:4px}
.form-group .input-row{display:flex;gap:8px}
.form-group .input-row input{flex:1}
.fetch-btn{padding:12px 16px;background:rgba(108,92,231,0.15);border:1px solid rgba(108,92,231,0.3);border-radius:var(--radius-md);color:var(--accent-light);cursor:pointer;font-size:0.82rem;font-family:var(--font-cn);white-space:nowrap;transition:var(--transition);letter-spacing:0.04em}
.fetch-btn:hover{background:rgba(108,92,231,0.25)}
.fetch-btn:disabled{opacity:0.5;cursor:not-allowed}
.favicon-preview{display:flex;align-items:center;gap:12px;margin-top:8px}
.favicon-preview img{width:32px;height:32px;border-radius:6px;background:var(--favicon-bg)}
.favicon-preview span{font-size:0.82rem;color:var(--text-secondary)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:28px}
.btn{padding:10px 22px;border-radius:var(--radius-md);font-size:0.9rem;font-weight:500;cursor:pointer;font-family:var(--font-cn);transition:var(--transition);border:none;letter-spacing:0.04em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light);transform:scale(1.02)}
.btn-secondary{background:var(--input-bg);color:var(--text-secondary);border:1px solid var(--border-glass)}
.btn-secondary:hover{background:var(--cell-hover);color:var(--text-primary)}
.btn-danger{background:rgba(231,76,60,0.15);color:var(--danger);border:1px solid rgba(231,76,60,0.2)}
.btn-danger:hover{background:rgba(231,76,60,0.25)}
.spinner,.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border-glass);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
.loading-spinner{border-color:var(--text-muted);border-top-color:var(--accent-light)}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-secondary);border:1px solid var(--border-glass);border-radius:var(--radius-md);padding:12px 24px;color:var(--text-primary);font-size:0.9rem;box-shadow:var(--shadow-float);z-index:2000;opacity:0;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(231,76,60,0.3);color:var(--danger)}
.toast.success{border-color:rgba(0,184,148,0.3);color:var(--success)}
.group-color-0 .group-icon{background:var(--group-icon-0-bg);color:var(--group-icon-0-c)}
.group-color-1 .group-icon{background:var(--group-icon-1-bg);color:var(--group-icon-1-c)}
.group-color-2 .group-icon{background:var(--group-icon-2-bg);color:var(--group-icon-2-c)}
.group-color-3 .group-icon{background:var(--group-icon-3-bg);color:var(--group-icon-3-c)}
.group-color-4 .group-icon{background:var(--group-icon-4-bg);color:var(--group-icon-4-c)}
.group-color-5 .group-icon{background:var(--group-icon-5-bg);color:var(--group-icon-5-c)}
.nav-color-0{background:var(--group-icon-0-bg);color:var(--group-icon-0-c)}
.nav-color-1{background:var(--group-icon-1-bg);color:var(--group-icon-1-c)}
.nav-color-2{background:var(--group-icon-2-bg);color:var(--group-icon-2-c)}
.nav-color-3{background:var(--group-icon-3-bg);color:var(--group-icon-3-c)}
.nav-color-4{background:var(--group-icon-4-bg);color:var(--group-icon-4-c)}
.nav-color-5{background:var(--group-icon-5-bg);color:var(--group-icon-5-c)}
.emoji-picker{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:8px}
.emoji-option{width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:var(--radius-sm);font-size:1.2rem;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.emoji-option:hover{background:var(--emoji-hover)}
.emoji-option.active{background:var(--accent-glow)}
.admin-only{display:none !important}
body.admin-mode .admin-only{display:flex !important}
.guest-only{display:none !important}
body:not(.admin-mode) .guest-only{display:flex !important}

<script>
const DATA_KEY='starnav_data',THEME_KEY='starnav_theme',BG_KEY='starnav_bg_image',BG_THEME_KEY='starnav_bg_theme',SERVER_HASH_KEY='starnav_server_hash',CACHE_PREFIX='starnav_cache_',CACHE_EXPIRE=604800000;
const ADMIN_HASH='44f61792d66021c0030fa37dca5162871345c525f61984b88fa1af16d8117672';
const EMOJIS=['📌','🔧','🎮','📚','💼','🎨','🎵','🌍','💡','🔥','⭐','🚀','📱','💻','🏠','❤️','🎯','🔑','☁️','📧','🛒','📷','🎬','🔬','📝','🎪','🌈','🏆','🤖','🧠','🧩','⚡','🛡️','🌐','📊','🎙️','💬','🧪','🎧','🧭','🏛️','📡','⚙️','🪄','🗂️','🧬','🤝','💰'];
const SVG_ICONS = {

};
let data=null,isAdmin=false,editingBookmark=null,editingGroup=null,selectedEmoji='📌',dragState=null,activeGroupId=null,navDragState=null;
const DOM={};
const FAV_MAP_KEY='starnav_fav_map';
let faviconMap={};

function initFaviconMap(){try{const cached=localStorage.getItem(FAV_MAP_KEY);if(cached)faviconMap=JSON.parse(cached)}catch(e){}}
function saveFaviconMap(){try{localStorage.setItem(FAV_MAP_KEY,JSON.stringify(faviconMap))}catch(e){}}

function defaultData(){return{adminHash:ADMIN_HASH,groups:[{id:genId(),name:'默认',emoji:'📌',bookmarks:[]}]}}

function saveLocal(){
  if(!data||!data.groups)return false;
  try{data._ts=Date.now();localStorage.setItem(DATA_KEY,JSON.stringify(data));return true}
  catch(e){return false}
}

function save(){
  if(!saveLocal()){
    showToast('保存失败：本地存储空间不足，请清理浏览器数据后重试','error');
  }
}

async function init(){
  // 简单字符串哈希，用于比对服务器 JSON 是否发生变化
  function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h.toString(36);}

  // 1. 检查 localStorage（用户的修改都存在这里）
  const cached=localStorage.getItem(DATA_KEY);
  let localData=null;
  if(cached){
    try{const d=JSON.parse(cached);if(d&&Array.isArray(d.groups)&&d.groups.length>0)localData=d}catch(e){}
  }

  // 2. 拉取服务器 JSON
  let serverData=null;
  try{
    const r=await fetch('navpage.json',{cache:'no-cache',headers:{'Cache-Control':'no-cache','Pragma':'no-cache'}});
    if(r.ok){
      const j=await r.json();
      if(j&&Array.isArray(j.groups)&&j.groups.length>0)serverData=j;
    }
  }catch(e){
    console.error('[init] JSON加载失败:',e.message);
  }

  // 3. 通过内容哈希判断服务器 JSON 是否更新
  //    - 服务器内容变了 → 以服务器为准（覆盖本地）
  //    - 服务器内容没变 → 以 localStorage 为准（保留用户在页面上的修改）
  const storedHash=localStorage.getItem(SERVER_HASH_KEY);
  const serverHash=serverData?hashStr(JSON.stringify({groups:serverData.groups,adminHash:serverData.adminHash})):null;

  if(localData && serverData && serverHash === storedHash){
    // 服务器未变化，使用 localStorage（保留用户在页面上的修改）
    data=localData; console.log('[init] localStorage (server unchanged), groups:'+data.groups.length);
  }else if(serverData){
    // 服务器变化了 或 本地无数据 → 使用服务器数据
    data=serverData; saveLocal();
    if(serverHash) localStorage.setItem(SERVER_HASH_KEY, serverHash);
    console.log('[init] server, groups:'+data.groups.length);
  }else if(localData){
    // 服务器不可用，使用本地数据兜底
    data=localData; console.log('[init] localStorage (server unavailable), groups:'+data.groups.length);
  }else{
    data=defaultData(); console.log('[init] default, groups:'+data.groups.length);
  }

  render();
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function getDomain(url){try{return new URL(url).hostname.replace(/^www\./,'')}catch(e){return url}}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function truncate(s,n){return!s?'':s.length>n?s.slice(0,n)+'…':s}

function isAdminLoggedIn(){return sessionStorage.getItem('starnav_admin')==='true'}
function setAdminState(v){
  isAdmin=v;
  if(v){sessionStorage.setItem('starnav_admin','true');document.body.classList.add('admin-mode')}
  else{sessionStorage.removeItem('starnav_admin');document.body.classList.remove('admin-mode')}
}
async function hashPassword(p){
  const d=new TextEncoder().encode(p+'_starnav_salt_2024'),h=await crypto.subtle.digest('SHA-256',d);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')
}
function openLoginModal(){
  if(isAdmin){setAdminState(false);render();showToast('已退出管理员模式','success');return}
  DOM.loginPassword.value='';
  DOM.loginModal.classList.add('show');
  setTimeout(()=>DOM.loginPassword.focus(),100);
}
async function doLogin(){
  const p=DOM.loginPassword.value;
  if(!p){showToast('请输入密码','error');return}
  const h=await hashPassword(p);
  if(h===(data.adminHash||ADMIN_HASH)){
    setAdminState(true);save();closeModal('loginModal');render();showToast('登录成功','success');
  }else showToast('密码错误','error');
}

function getFaviconUrl(url){
  try{
    const d=getDomain(url);
    if(faviconMap[d])return faviconMap[d];
    return`https://www.google.com/s2/favicons?domain=${d}&sz=32`
  }catch(e){return''}
}
function tryNextFavicon(img){
  const c=img.parentElement,url=c.dataset.url;
  if(!url){img.style.display='none';c.innerHTML='<span class="fallback-icon">🔗</span>';return}
  const fb=[`https://www.google.com/s2/favicons?domain=${getDomain(url)}&sz=32`,`https://icons.duckduckgo.com/ip3/${getDomain(url)}.ico`,`https://${getDomain(url)}/favicon.ico`],step=parseInt(img.dataset.fbStep||'0'),next=step+1;
  if(next<fb.length){img.dataset.fbStep=next;img.src=fb[next]}
  else{img.style.display='none';c.innerHTML='<span class="fallback-icon">🔗</span>'}
}
function onFaviconSuccess(img){
  try{
    const c=img.parentElement,url=c.dataset.url;
    if(url){
      const d=getDomain(url);
      if(d&&!faviconMap[d]&&img.src&&img.src!==`https://${d}/favicon.ico` && !img.src.includes('data:image')){
        faviconMap[d]=img.src;
        saveFaviconMap();
      }
    }
  }catch(e){}
}

function extractFaviconFromHtml(html,origin){
  const p=new DOMParser().parseFromString(html,'text/html');
  const s=['link[rel="icon"][type="image/svg+xml"]','link[rel="icon"][sizes="192x192"]','link[rel="icon"][sizes="180x180"]','link[rel="apple-touch-icon"]','link[rel="apple-touch-icon-precomposed"]','link[rel="icon"]','link[rel="shortcut icon"]'];
  for(const sel of s){const el=p.querySelector(sel);if(el&&el.getAttribute('href')){let h=el.getAttribute('href');if(h.startsWith('//'))h='https:'+h;else if(h.startsWith('/'))h=origin+h;else if(!h.startsWith('http'))h=origin+'/'+h;return h}}
  return'';
}
function extractTitleFromHtml(html){
  const p=new DOMParser().parseFromString(html,'text/html');
  let t=p.querySelector('meta[property="og:site_name"]')?.content?.trim();if(t)return cleanTitle(t);
  t=p.querySelector('meta[property="og:title"]')?.content?.trim();if(t)return cleanTitle(t);
  t=p.querySelector('title')?.textContent?.trim();if(t)return cleanTitle(t);
  t=p.querySelector('meta[name="application-name"]')?.content?.trim();if(t)return cleanTitle(t);
  return'';
}
function cleanTitle(t){
  if(!t)return'';t=t.trim();
  for(const s of[' - 首页',' - 登录',' - 注册',' - 官方网站',' - 官网','—首页','—登录','_首页','_登录','|首页','|登录'])if(t.endsWith(s))t=t.slice(0,-s.length).trim();
  t=t.replace(/[-_|–—]\s?.{0,40}$/,'').trim();t=t.replace(/[「」【】]/g,'').trim();return t.replace(/\s+/g,' ').trim();
}
function getCachedSiteInfo(d){try{const r=localStorage.getItem(CACHE_PREFIX+d);if(!r)return null;const c=JSON.parse(r);if(Date.now()-c.timestamp>CACHE_EXPIRE){localStorage.removeItem(CACHE_PREFIX+d);return null}return c}catch(e){return null}}
function setCachedSiteInfo(d,i){try{localStorage.setItem(CACHE_PREFIX+d,JSON.stringify({...i,timestamp:Date.now()}))}catch(e){}}

async function fetchWithProxy(proxy,target){
  try{const r=await fetch(proxy+encodeURIComponent(target),{signal:AbortSignal.timeout(8000),headers:{'Accept':'text/html','Accept-Language':'zh-CN,zh;q=0.9,en;q=0.8'}});if(r.ok){const t=await r.text();if(t.length>100)return t}}catch(e){}
  return'';
}
async function fetchSiteInfo(){
  const urlInput=DOM.bmUrl;let url=urlInput.value.trim();if(!url)return;
  if(!/^https?:\/\//i.test(url)){url='https://'+url;urlInput.value=url}
  const fetchBtn=DOM.fetchBtn,domain=getDomain(url);
  fetchBtn.disabled=true;fetchBtn.innerHTML='<span class="loading-spinner"></span>';
  updateFaviconPreview(getFaviconUrl(url));
  let title='',faviconUrl='';
  const cached=getCachedSiteInfo(domain);
  if(cached){title=cached.title||'';faviconUrl=cached.favicon||'';if(faviconUrl)updateFaviconPreview(faviconUrl);if(title)DOM.bmName.value=title;fetchBtn.disabled=false;fetchBtn.textContent='自动获取';return}
  const proxies=[`https://api.allorigins.win/raw?url=`,`https://corsproxy.io/?url=`,`https://api.codetabs.com/v1/proxy?quest=`];
  const results=await Promise.allSettled(proxies.map(p=>fetchWithProxy(p,url)));
  let bestHtml='';for(const r of results)if(r.status==='fulfilled'&&r.value&&r.value.length>bestHtml.length)bestHtml=r.value;
  if(bestHtml.length>100){const u=new URL(url);faviconUrl=extractFaviconFromHtml(bestHtml,u.origin);title=extractTitleFromHtml(bestHtml);if(faviconUrl)updateFaviconPreview(faviconUrl);setCachedSiteInfo(domain,{title,favicon:faviconUrl})}
  DOM.bmName.value=title||domain;fetchBtn.disabled=false;fetchBtn.textContent='自动获取';
}

function openBookmarkModal(groupId,bookmarkId){
  if(!isAdmin)return;editingBookmark=bookmarkId?{groupId,bookmarkId}:{groupId,bookmarkId:null};
  if(bookmarkId){const g=data.groups.find(g=>g.id===groupId),bm=g?.bookmarks.find(b=>b.id===bookmarkId);

  }else{DOM.bookmarkModalTitle.textContent='添加书签';DOM.bmUrl.value='';DOM.bmName.value='';DOM.bmDesc.value='';DOM.faviconPreview.innerHTML='<span style="color:var(--text-muted)">输入网址后自动获取</span>'}
  DOM.bookmarkModal.classList.add('show');setTimeout(()=>DOM.bmUrl.focus(),100);
}
function saveBookmark(){
  const url=DOM.bmUrl.value.trim(),name=DOM.bmName.value.trim(),desc=DOM.bmDesc.value.trim();
  if(!url){showToast('请输入网址','error');return}
  const fUrl=/^https?:\/\//i.test(url)?url:'https://'+url,fName=name||getDomain(fUrl),favicon=getFaviconUrl(fUrl);
  const group=data.groups.find(g=>g.id===editingBookmark.groupId);if(!group)return;
  if(editingBookmark.bookmarkId){const bm=group.bookmarks.find(b=>b.id===editingBookmark.bookmarkId);if(bm){bm.url=fUrl;bm.name=fName;bm.desc=desc;bm.favicon=favicon}}
  else group.bookmarks.push({id:genId(),name:fName,url:fUrl,favicon,desc});
  save();render();closeModal('bookmarkModal');showToast(editingBookmark.bookmarkId?'书签已更新':'书签已添加','success');
}
function openGroupModal(groupId){
  if(!isAdmin)return;editingGroup=groupId||null;renderEmojiPicker();
  if(groupId){const g=data.groups.find(g=>g.id===groupId);if(g){DOM.groupModalTitle.textContent='编辑分组';DOM.groupName.value=g.name;selectedEmoji=g.emoji;renderEmojiPicker()}}
  else{DOM.groupModalTitle.textContent='添加分组';DOM.groupName.value='';selectedEmoji='📌';renderEmojiPicker()}

function saveGroup(){

  if(editingGroup){const g=data.groups.find(g=>g.id===editingGroup);if(g){g.name=name;g.emoji=selectedEmoji}}
  else data.groups.push({id:genId(),name,emoji:selectedEmoji,bookmarks:[]});
  save();render();closeModal('groupModal');showToast(editingGroup?'分组已更新':'分组已添加','success');

function confirmDeleteGroup(id){
  if(!isAdmin)return;const g=data.groups.find(g=>g.id===id);if(!g)return;

function confirmDeleteBookmark(gid,bid){
  if(!isAdmin)return;const g=data.groups.find(g=>g.id===gid),bm=g?.bookmarks.find(b=>b.id===bid);if(!bm)return;

function onDragStart(e,gid,bid){if(!isAdmin){e.preventDefault();return}dragState={fromGroupId:gid,bookmarkId:bid};e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging')}
function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move'}
function onDragEnter(e){e.preventDefault();const c=e.target.closest('.bookmark-card');if(c)c.classList.add('drag-over')}
function onDragLeave(e){const c=e.target.closest('.bookmark-card');if(c)c.classList.remove('drag-over')}
function onDrop(e,tgid,tbid){
  e.preventDefault();const c=e.target.closest('.bookmark-card');if(c)c.classList.remove('drag-over');
  if(!dragState||!isAdmin)return;const{fromGroupId,bookmarkId}=dragState;
  if(fromGroupId===tgid&&bookmarkId===tbid)return;
  const fg=data.groups.find(g=>g.id===fromGroupId),tg=data.groups.find(g=>g.id===tgid);if(!fg||!tg)return;
  const bi=fg.bookmarks.findIndex(b=>b.id===bookmarkId);if(bi===-1)return;
  const[bm]=fg.bookmarks.splice(bi,1);const ti=tg.bookmarks.findIndex(b=>b.id===tbid);tg.bookmarks.splice(ti,0,bm);
  save();render();dragState=null;
}
function onDragEnd(e){e.target.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));dragState=null}
function onNavDragStart(e,id){if(!isAdmin){e.preventDefault();return}navDragState=id;e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging')}
function onNavDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move'}
function onNavDragEnter(e){e.preventDefault()}
function onNavDrop(e,targetId){e.preventDefault();if(!navDragState||!isAdmin||navDragState===targetId)return;const si=data.groups.findIndex(g=>g.id===navDragState),ti=data.groups.findIndex(g=>g.id===targetId);if(si===-1||ti===-1)return;const[gp]=data.groups.splice(si,1);data.groups.splice(ti,0,gp);save();render();navDragState=null}
function onNavDragEnd(e){e.target.classList.remove('dragging');navDragState=null}

function exportData(){
  if(!isAdmin)return;
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='navpage.json';a.click();URL.revokeObjectURL(u);showToast('已下载 navpage.json，上传到服务器覆盖即可','success');
}
function importData(event){
  if(!isAdmin)return;const f=event.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(imp.groups&&Array.isArray(imp.groups)){data.groups=imp.groups;if(imp.adminHash)data.adminHash=imp.adminHash;if(imp._ts)data._ts=imp._ts;save();render();showToast('已导入 '+imp.groups.length+' 个分组','success')}
      else showToast('文件格式不正确，需包含groups数组','error');
    }catch(err){showToast('导入失败：无法解析文件','error')}
  };r.readAsText(f);event.target.value='';
}
